<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. Base reset and dark theme styling matching the login page */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #191f2b; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }
        
        #container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
        }
        
        /* 2. Welcome screen: subtle background gradient and glow effect */
        #welcome-screen {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            background: radial-gradient(circle at 10% 10%, rgba(255, 110, 0, 0.08) 0%, #161b26 100%); 
            transition: opacity 1s ease; 
            z-index: 2;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        #welcome-title {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 12px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #welcome-text {
            font-size: 14px;
            color: #8c9ba5;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Breathing orange loader matching the theme of your login button */
        .loader {
            width: 8px;
            height: 8px;
            background-color: #ff6e00;
            border-radius: 50%;
            box-shadow: 0 0 12px #ff6e00, 0 0 20px rgba(255, 110, 0, 0.5);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* 3. Remote iframe styling */
        #remote-iframe {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            border: none; 
            opacity: 0; 
            transition: opacity 1s ease; 
            z-index: 1;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="welcome-screen">
        <h1 id="welcome-title">Welcome</h1>
        <p id="welcome-text">Loading announcement...</p>
        <div class="loader"></div>
    </div>
    <!-- Removed static src to allow JS dynamic loading, preventing duplicate network requests -->
    <iframe id="remote-iframe"></iframe>
</div>

<script>
    // Remote announcement URL (replace this with your target URL)
    const REMOTE_BASE_URL = "YOUR_REMOTE_URL_HERE";

    // 1. Define translation dictionary[cite: 1]
    const translations = {
        'en': { title: 'Welcome', text: 'Loading announcement...' },
        'zh': { title: '欢迎访问', text: '正在加载公告...' }
    };

    // 2. Language determination fallback logic
    let finalLang = '';

    // Step A: Try to get 'lang' parameter from the current URL
    const urlParams = new URLSearchParams(window.location.search);
    let paramLang = urlParams.get('lang');

    if (paramLang) {
        paramLang = paramLang.toLowerCase();
        if (paramLang.startsWith('zh')) {
            finalLang = 'zh';
        } else if (paramLang.startsWith('en')) {
            finalLang = 'en';
        }
    }

    // Step B (Fallback): If URL param is missing or invalid, use system/browser language[cite: 1]
    if (!finalLang) {
        const sysLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
        if (sysLang.startsWith('zh')) {
            finalLang = 'zh';
        } else {
            finalLang = 'en'; // Default to English if no match is found
        }
    }

    // 3. Apply translations to the local welcome screen[cite: 1]
    document.getElementById('welcome-title').innerText = translations[finalLang].title;
    document.getElementById('welcome-text').innerText = translations[finalLang].text;

    // 4. Append the determined language parameter to the remote URL and inject into the iframe
    const iframe = document.getElementById('remote-iframe');
    // Check if the remote URL already contains parameters to decide using '?' or '&'
    const separator = REMOTE_BASE_URL.includes('?') ? '&' : '?';
    const finalRemoteUrl = `${REMOTE_BASE_URL}${separator}lang=${finalLang}`;
    iframe.src = finalRemoteUrl;

    // 5. Keep the welcome screen for at least 2 seconds, then transition to the remote iframe
    const welcomeScreen = document.getElementById('welcome-screen');

    setTimeout(() => {
        iframe.style.opacity = '1';
        welcomeScreen.style.opacity = '0';
        setTimeout(() => { 
            // Hide the welcome screen container after the fade-out transition completes
            welcomeScreen.style.display = 'none'; 
        }, 1000);
    }, 2000);
</script>

</body>
</html>
