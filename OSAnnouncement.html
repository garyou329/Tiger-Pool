<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #191f2b; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }
        
        #container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
        }
        
        /* 2 */
        #welcome-screen {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            background: radial-gradient(circle at 10% 10%, rgba(255, 110, 0, 0.08) 0%, #161b26 100%); 
            transition: opacity 1s ease; 
            z-index: 2;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        #welcome-title {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 12px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #welcome-text {
            font-size: 14px;
            color: #8c9ba5;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .loader {
            width: 8px;
            height: 8px;
            background-color: #ff6e00;
            border-radius: 50%;
            box-shadow: 0 0 12px #ff6e00, 0 0 20px rgba(255, 110, 0, 0.5);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* 4 */
        #remote-iframe {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            border: none; 
            opacity: 0; 
            transition: opacity 1s ease; 
            z-index: 1;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="welcome-screen">
        <h1 id="welcome-title">Welcome</h1>
        <p id="welcome-text">Loading announcement...</p>
        <div class="loader"></div>
    </div>
    <iframe id="remote-iframe" src="YOUR_REMOTE_URL_HERE"></iframe>
</div>

<script>
    // 1
    const translations = {
        'en': { title: 'Welcome', text: 'Loading announcement...' },
        'zh': { title: '欢迎访问', text: '正在加载公告...' }
    };

    // 2
    const userLang = navigator.language || navigator.userLanguage;
    const lang = userLang.startsWith('zh') ? 'zh' : 'en';

    // 3
    document.getElementById('welcome-title').innerText = translations[lang].title;
    document.getElementById('welcome-text').innerText = translations[lang].text;

    // 4
    const welcomeScreen = document.getElementById('welcome-screen');
    const iframe = document.getElementById('remote-iframe');

    setTimeout(() => {
        iframe.style.opacity = '1';
        welcomeScreen.style.opacity = '0';
        setTimeout(() => { 
            welcomeScreen.style.display = 'none'; 
        }, 1000);
    }, 2000);
</script>

</body>
</html>
